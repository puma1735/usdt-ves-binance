name: Update Rates

on:
  repository_dispatch:
    types: [manual_trigger]  # Este es el nombre del evento que enviaremos
  workflow_dispatch:          # Esto te permite ejecutarlo manualmente desde la web

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add rates.json
          # Esto actualiza el último commit con la hora actual
          git commit --amend -m "Rates actualizados: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || git commit -m "Update rates"
          # El --force es obligatorio al usar --amend
          git push origin main --force
